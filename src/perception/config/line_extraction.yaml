line_extraction_middleware:
  ros__parameters:
    # Max perpendicular distance (m) before a point arc is split into two lines
    split_threshold: 0.05
    # Minimum number of scan points required to form a line segment
    min_points_per_line: 6
    # Minimum physical length (m) of a line segment to be kept
    min_line_length: 0.3
    # Maximum extrapolation distance (m) from a segment endpoint to the corner intersection
    # Tighten this to reduce false corners, loosen if real corners are being missed
    max_extrapolation: 1.2
    # Minimum angle (degrees) between two lines for their intersection to count as a corner
    # Keeps corners from nearly-parallel wall pairs (e.g. two sides of a narrow hallway)
    min_corner_angle: 30.0
    # Euclidean gap (m) between consecutive scan points that starts a new arc
    gap_threshold: 0.5
    # Corners closer than this to the sensor origin are discarded (robot body self-returns)
    min_corner_distance: 0.5
