particle_filter:
  ros__parameters:
    num_particles: 50
    new_particle_increase: 1
    max_range: 9.0 # meters — must cover most of a typical room
    max_angle: 250.0 # degrees
    new_particle_threshold: 0.01
    neff_threshold: 0.5
    measurement_noise_range: 0.1 # meters
    measurement_noise_bearing: 0.05 # rad
    linear_velocity_alpha_1: 0.05
    linear_velocity_alpha_2: 0.05
    angular_velocity_alpha_2: 0.15
    angular_velocity_alpha_1: 0.15
